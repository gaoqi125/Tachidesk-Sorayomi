name: Build iOS (No Codesign)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (Requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Fix iOS Deployment Target (Auto Patch)
        run: |
          sed -i '' -e 's/flutter_additional_ios_build_settings(target)/flutter_additional_ios_build_settings(target)\n      target.build_configurations.each do |config|\n        config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "12.0"\n      end/g' ios/Podfile
          sed -i '' "s/^# platform :ios.*/platform :ios, '12.0'/g" ios/Podfile
          sed -i '' "s/^platform :ios.*/platform :ios, '12.0'/g" ios/Podfile

      - name: Build iOS App
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qq -r Sorayomi.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sorayomi-iOS-Test
          path: Sorayomi.ipa
